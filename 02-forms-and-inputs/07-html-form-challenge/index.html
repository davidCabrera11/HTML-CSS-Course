<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>Apartment Search</h1>
    <div>
      <form method="POST">
        <div>
          <label for="location">Location</label>
          <input
            type="text"
            name="location"
            id="location"
            placeholder="Colombia"
          />
        </div>
        <br />
        <div>
          <label for="monthlyPrice">Monthly Price</label>
          <input type="number" name="monthlyPrice" id="monthlyPrice" />
        </div>
        <br />
        <div>
          <label for="numberBedrooms">Number of Bedrooms</label>
          <input type="number" name="numberBedrooms" id="numberBedrooms" />
        </div>
        <br />
        <div>
          <label for="numberBathrooms">Number of Bathrooms</label>
          <input type="number" name="numberBathrooms" id="numberBathrooms" />
        </div>
        <br />
        <div>
          <label for="petsAllowed">Pets Allowed</label>
          <input type="checkbox" name="petsAllowed" id="petsAllowed" />
        </div>
        <br />
        <div>
          <label for="dateAvailable">Date Available</label>
          <input type="date" name="dateAvailable" id="dateAvailable" />
        </div>
        <br />
        <input type="submit" value="Submit" />
      </form>
    </div>
  </body>
</html>
