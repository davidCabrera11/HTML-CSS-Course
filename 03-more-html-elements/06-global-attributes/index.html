<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>HTML & CSS Sandbox - Global Attributes</h1>

    <button title="Home button" accesskey="h">Home</button>

    <!--Hidden-->
    <div hidden>Hidden div</div>
    <div>Unhidden div</div>

    <button tabindex="3">Button 1</button>
    <button tabindex="1">Button 2</button>
    <button tabindex="2">Button 3</button>

    <!--Content Editable-->
    <div contenteditable="true">Editable div element</div>

    <!--Draggable-->
    <div draggable="true">Draggable div</div>

    <!--Auto Focus-->
    <input type="text" autofocus />
  </body>
</html>
